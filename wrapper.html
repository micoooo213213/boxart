<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOTEL</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0e0c09;overflow:hidden;font-family:sans-serif}

    /* Loading screen */
    #loading{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      background:#0e0c09;
      transition:opacity .5s ease;
    }
    #loading.hidden{opacity:0;pointer-events:none;}

    .hotel-logo{
      font-size:18px;letter-spacing:.5em;color:rgba(201,169,110,0.4);
      text-transform:uppercase;margin-bottom:8px;
    }
    .spinner{
      width:32px;height:32px;
      border:1.5px solid rgba(201,169,110,0.15);
      border-top-color:#c9a96e;
      border-radius:50%;
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{
      font-size:8px;letter-spacing:.4em;color:rgba(201,169,110,0.35);
      text-transform:uppercase;
    }

    /* Game iframe */
    #gf{
      position:fixed;top:0;left:0;right:0;bottom:0;
      width:100%;height:100%;border:none;background:#000;
      opacity:0;transition:opacity .4s ease;
    }
    #gf.ready{opacity:1;}

    /* Error state */
    #err{
      display:none;
      position:fixed;inset:0;align-items:center;justify-content:center;
      background:#0e0c09;flex-direction:column;gap:16px;
    }
    #err.show{display:flex;}
    .err-title{font-size:14px;color:rgba(201,169,110,0.6);letter-spacing:.15em;}
    .err-body{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:.05em;text-align:center;line-height:1.8;}
  </style>
</head>
<body>

  <div id="loading">
    <div class="hotel-logo">HOTEL</div>
    <div class="spinner"></div>
    <div class="load-txt">Loading game</div>
  </div>

  <div id="err">
    <div class="err-title">Could not load game</div>
    <div class="err-body" id="errBody">No URL provided.</div>
  </div>

  <iframe
    id="gf"
    allowfullscreen
    allow="fullscreen; autoplay; gamepad; clipboard-write"
  ></iframe>

  <script>
    var params  = new URLSearchParams(window.location.search);
    var gameUrl = params.get('url');
    var frame   = document.getElementById('gf');
    var loading = document.getElementById('loading');
    var err     = document.getElementById('err');
    var errBody = document.getElementById('errBody');

    function showError(msg) {
      loading.classList.add('hidden');
      errBody.textContent = msg;
      err.classList.add('show');
    }

    function gameReady() {
      frame.classList.add('ready');
      loading.classList.add('hidden');
    }

    if (!gameUrl) {
      showError('No game URL provided. Add ?url=GAME_URL to the address.');
    } else {
      /* Set the iframe src to the game URL directly.
         Because this wrapper page is opened in a new window
         (not embedded in another page), the browser treats it
         as a top-level context — many X-Frame-Options rules
         that would block an iframe on your hotel site do NOT
         apply here, so jsDelivr games load correctly.        */
      frame.src = decodeURIComponent(gameUrl);

      frame.addEventListener('load', gameReady);

      /* Safety fallback — show game after 5s regardless */
      setTimeout(gameReady, 5000);
    }
  </script>

</body>
</html>
